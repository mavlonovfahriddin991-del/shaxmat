<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>GAME</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    color:white;

    background:url("https://images.unsplash.com/photo-1528819622765-d6bcf132f793?auto=format&fit=crop&w=1200&q=60");
    background-size:cover;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.content{
    position:relative;
    z-index:1;
    text-align:center;
}

button{
    padding:15px 30px;
    background:orange;
    border:none;
}
</style>
</head>

<body>

<div class="content">
    <h2 id="name"></h2>
    <button onclick="start()">START GAME</button>
</div>

<script>
document.getElementById("name").innerText =
localStorage.getItem("player");

function start(){
    window.location.href="chess.html";
}
</script>

</body>
</html>
